dataDir: ~/.agent-orchestrator
worktreeDir: ~/.worktrees
port: 3000
defaults:
  runtime: tmux
  agent: opencode
  agentConfig:
    model: minimax-m2.7
  workspace: worktree
  notifiers:
    - desktop
projects:
  backend-team:
    name: Ralphito Backend
    sessionPrefix: be
    repo: Jopen-89/RalphitoRevolution
    path: /home/pepu/IAproject/RalphitoRevolution
    defaultBranch: master
    agentRulesFile: .agent-rules.md
    agent: opencode
    agentConfig:
      model: minimax-m2.7
